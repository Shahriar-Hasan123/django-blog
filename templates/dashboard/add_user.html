{% extends 'base.html' %} 

{% block content %}
{% load crispy_forms_tags %}

<div class="row">
  <!--Left sidebar-->
  <!--Load sidebar here-->
  {% include 'dashboard/sidebar.html' %}

  <!--Right sidebar-->
  <div class="col-md-9">
    {% if perms.auth.view_user %}

      <h2>Add New User</h2>
      <form action="{% url 'add_user' %}" method="POST">
          {% csrf_token %}
          {{form | crispy}}
          <button type="submit" class="btn btn-success">Add</button>
      </form>
      
    {%else%}
      <h5 style="text-align: center;">You do not have permission to view this page</h5>     
    {%endif%}
  </div>
</div>
<br>

{% endblock %}
